<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Seeing Clearly">
<meta name="theme-color" content="#085041">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Seeing Clearly — 21 Day Vision Programme</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-mid: #5DCAA5;
    --teal-dark: #085041;
    --gold: #BA7517;
    --gold-light: #FAEEDA;
    --gold-mid: #EF9F27;
    --dark: #2C2C2A;
    --mid: #5F5E5A;
    --light: #F1EFE8;
    --white: #ffffff;
    --border: rgba(44,44,42,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    color: var(--dark);
    background: #fafaf8;
    line-height: 1.7;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .serif { font-family: 'Cormorant Garamond', serif; }

  /* HERO */
  .hero {
    background: var(--teal-dark);
    color: white;
    padding: calc(env(safe-area-inset-top) + 2.5rem) 1.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before { content: ''; position: absolute; top: -60px; left: -60px; width: 280px; height: 280px; border-radius: 50%; background: rgba(93,202,165,0.12); }
  .hero::after { content: ''; position: absolute; bottom: -80px; right: -40px; width: 220px; height: 220px; border-radius: 50%; background: rgba(186,117,23,0.15); }
  .hero-badge {
    display: inline-block;
    background: rgba(93,202,165,0.25);
    color: var(--teal-mid);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 1rem;
    position: relative;
    z-index: 1;
  }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 8vw, 3.4rem);
    font-weight: 400;
    line-height: 1.1;
    color: white;
    position: relative;
    z-index: 1;
  }
  .hero h1 em { font-style: italic; color: var(--teal-mid); }
  .hero-sub {
    font-size: 0.92rem;
    color: rgba(255,255,255,0.7);
    max-width: 480px;
    margin: 0.5rem auto 0;
    position: relative;
    z-index: 1;
  }

  /* TAB NAV */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 0.9rem 1.1rem;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--teal); }
  .tab.active {
    color: var(--teal-dark);
    border-bottom-color: var(--teal);
    background: var(--teal-light);
  }

  .container { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

  /* WEEK INTRO */
  .week-intro { margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .week-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 0.4rem;
  }
  .week-intro h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.85rem;
    font-weight: 400;
    color: var(--dark);
    line-height: 1.2;
    margin-bottom: 0.6rem;
  }
  .week-intro h2 em { color: var(--teal); font-style: italic; }
  .week-intro p { font-size: 0.9rem; color: var(--mid); }

  /* DAY CARDS */
  .days-grid { display: flex; flex-direction: column; gap: 0.85rem; }
  .day-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .day-card.complete {
    background: var(--teal-light);
    border-color: var(--teal-mid);
  }
  .day-header {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.9rem 1rem;
    cursor: pointer;
    user-select: none;
  }
  .day-num {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--teal-light);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--teal-dark);
    flex-shrink: 0;
  }
  .day-card.complete .day-num {
    background: var(--teal);
    color: white;
  }
  .day-num.gold-bg { background: var(--gold-light); color: var(--gold); }
  .day-header-text { flex: 1; min-width: 0; }
  .day-name { font-size: 0.92rem; font-weight: 500; color: var(--dark); }
  .day-theme {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.88rem;
    font-style: italic;
    color: var(--mid);
  }
  .day-chevron { color: var(--mid); font-size: 0.75rem; transition: transform 0.2s; flex-shrink: 0; }
  .day-card.open .day-chevron { transform: rotate(180deg); }
  .day-body { display: none; padding: 0 1rem 1.25rem; border-top: 1px solid var(--border); }
  .day-card.open .day-body { display: block; }

  /* SECTIONS WITHIN DAYS */
  .practice-section { margin-top: 1rem; }
  .practice-section h4 {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 0.6rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--teal-light);
  }
  .practice-block {
    background: var(--light);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    margin-bottom: 0.6rem;
  }
  .practice-block-title {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--dark);
    margin-bottom: 0.3rem;
  }
  .practice-block p, .practice-block li {
    font-size: 0.83rem;
    color: var(--mid);
    line-height: 1.6;
  }
  .practice-block ul { padding-left: 1.1rem; margin-top: 0.3rem; }
  .practice-block ul li { margin-bottom: 0.2rem; }

  .quote-block {
    background: var(--teal-light);
    border-left: 3px solid var(--teal);
    border-radius: 0 10px 10px 0;
    padding: 0.85rem 1rem;
    margin-bottom: 0.6rem;
  }
  .quote-block p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.98rem;
    font-style: italic;
    color: var(--teal-dark);
    line-height: 1.55;
  }
  .quote-block cite {
    display: block;
    font-size: 0.72rem;
    color: var(--teal);
    font-style: normal;
    font-weight: 500;
    margin-top: 0.4rem;
  }

  .gold-block {
    background: var(--gold-light);
    border-left: 3px solid var(--gold-mid);
    border-radius: 0 10px 10px 0;
    padding: 0.8rem 1rem;
    margin-bottom: 0.6rem;
  }
  .gold-block p { font-size: 0.83rem; color: var(--mid); }
  .gold-block strong { color: var(--gold); }

  .screen-block {
    background: #E6F1FB;
    border-left: 3px solid #185FA5;
    border-radius: 0 10px 10px 0;
    padding: 0.8rem 1rem;
    margin-bottom: 0.6rem;
  }
  .screen-block p { font-size: 0.83rem; color: var(--mid); }
  .screen-block strong { color: #0C447C; }

  /* MARK COMPLETE BUTTON */
  .complete-btn {
    width: 100%;
    margin-top: 1rem;
    padding: 0.7rem;
    border: 1.5px solid var(--teal);
    background: var(--white);
    color: var(--teal);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .complete-btn:hover { background: var(--teal-light); }
  .complete-btn.done {
    background: var(--teal);
    color: white;
    border-color: var(--teal);
  }

  /* RITUAL BOX */
  .ritual-box {
    background: var(--teal-dark);
    border-radius: 14px;
    padding: 1.25rem;
    margin: 1.25rem 0;
    color: white;
  }
  .ritual-box h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--teal-mid);
    margin-bottom: 0.85rem;
  }
  .ritual-row {
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
    margin-bottom: 0.6rem;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.85);
    line-height: 1.55;
  }
  .ritual-time {
    font-size: 0.68rem;
    font-weight: 500;
    color: var(--teal-mid);
    background: rgba(93,202,165,0.2);
    padding: 3px 8px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* FOUNDATIONS */
  .foundations-card {
    background: var(--gold-light);
    border-left: 4px solid var(--gold-mid);
    border-radius: 0 12px 12px 0;
    padding: 1.1rem 1.25rem;
    margin-bottom: 1.25rem;
  }
  .foundations-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }
  .foundations-card p { font-size: 0.86rem; color: var(--mid); }

  .section-hidden { display: none; }

  /* TIMER */
  .timer-card {
    background: linear-gradient(135deg, var(--teal-dark), #0a6b56);
    border-radius: 18px;
    padding: 1.75rem 1.25rem;
    text-align: center;
    color: white;
    margin-bottom: 1.5rem;
  }
  .timer-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: var(--teal-mid);
    margin-bottom: 0.5rem;
  }
  .timer-card p.timer-desc {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
    margin-bottom: 1.25rem;
  }
  .timer-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4.5rem;
    font-weight: 400;
    line-height: 1;
    margin-bottom: 0.5rem;
    color: white;
    letter-spacing: 0.02em;
  }
  .timer-status {
    font-size: 0.78rem;
    color: var(--teal-mid);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1.25rem;
    min-height: 1.2em;
  }
  .timer-controls { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }
  .timer-btn {
    background: rgba(93,202,165,0.2);
    border: 1px solid var(--teal-mid);
    color: var(--teal-mid);
    padding: 0.55rem 1.1rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .timer-btn:hover { background: rgba(93,202,165,0.3); }
  .timer-btn.primary {
    background: var(--teal-mid);
    color: var(--teal-dark);
  }
  .timer-btn.primary:hover { background: white; }

  /* TIMER ALERT MODAL */
  .alert-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8, 80, 65, 0.92);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    animation: fadeIn 0.3s ease;
  }
  .alert-overlay.show { display: flex; }
  .alert-card {
    background: white;
    border-radius: 20px;
    padding: 2rem 1.5rem;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  .alert-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    color: var(--teal-dark);
    margin-bottom: 0.6rem;
  }
  .alert-card .alert-eye {
    width: 70px; height: 70px;
    margin: 0 auto 1rem;
    border-radius: 50%;
    background: var(--teal-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
  }
  .alert-card p { font-size: 0.9rem; color: var(--mid); margin-bottom: 1.25rem; line-height: 1.6; }
  .alert-countdown {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem;
    color: var(--teal);
    font-weight: 400;
    margin-bottom: 1rem;
  }
  .alert-btn {
    background: var(--teal);
    color: white;
    border: none;
    padding: 0.7rem 1.5rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  /* VISION CHECK */
  .check-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .check-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    color: var(--teal-dark);
    margin-bottom: 0.5rem;
  }
  .check-card .small { font-size: 0.82rem; color: var(--mid); margin-bottom: 1rem; }
  .eye-chart {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    text-align: center;
    margin-bottom: 1rem;
  }
  .chart-row { font-family: 'Courier New', monospace; font-weight: bold; color: black; line-height: 1; margin-bottom: 0.6rem; letter-spacing: 0.1em; }
  .chart-row.r1 { font-size: 60px; }
  .chart-row.r2 { font-size: 42px; }
  .chart-row.r3 { font-size: 30px; }
  .chart-row.r4 { font-size: 22px; }
  .chart-row.r5 { font-size: 16px; }
  .chart-row.r6 { font-size: 12px; }
  .chart-instructions {
    background: var(--teal-light);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.8rem;
    color: var(--teal-dark);
    margin-bottom: 1rem;
    line-height: 1.5;
  }
  .check-form { display: flex; flex-direction: column; gap: 0.75rem; }
  .check-form label { font-size: 0.82rem; font-weight: 500; color: var(--dark); }
  .check-form input, .check-form select, .check-form textarea {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--dark);
    background: var(--white);
  }
  .check-form textarea { min-height: 70px; resize: vertical; }
  .check-save {
    background: var(--teal);
    color: white;
    border: none;
    padding: 0.7rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 0.4rem;
  }
  .check-history { margin-top: 1.25rem; }
  .check-entry {
    background: var(--light);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    margin-bottom: 0.6rem;
    font-size: 0.82rem;
    color: var(--mid);
  }
  .check-entry strong { color: var(--teal-dark); }

  /* INTENTION */
  .intention-card {
    background: var(--teal-dark);
    border-radius: 18px;
    padding: 1.75rem 1.25rem;
    color: white;
    margin-bottom: 1.25rem;
    position: relative;
    overflow: hidden;
  }
  .intention-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 180px; height: 180px; border-radius: 50%; background: rgba(93,202,165,0.1); }
  .intention-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: var(--teal-mid);
    margin-bottom: 0.75rem;
    position: relative;
    z-index: 1;
  }
  .intention-card p {
    font-size: 0.88rem;
    color: rgba(255,255,255,0.85);
    margin-bottom: 0.85rem;
    line-height: 1.65;
    position: relative;
    z-index: 1;
  }
  .intention-card .commitment {
    background: rgba(93,202,165,0.15);
    border-left: 3px solid var(--teal-mid);
    padding: 0.85rem 1rem;
    border-radius: 0 8px 8px 0;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: white;
    margin: 1rem 0;
    position: relative;
    z-index: 1;
  }
  .intention-form {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 0.85rem;
    margin-top: 1rem;
    position: relative;
    z-index: 1;
  }
  .intention-form label {
    display: block;
    font-size: 0.78rem;
    color: var(--teal-mid);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .intention-form textarea {
    width: 100%;
    padding: 0.7rem;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    color: white;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    min-height: 80px;
    resize: vertical;
  }
  .intention-form textarea::placeholder { color: rgba(255,255,255,0.4); }
  .intention-save {
    background: var(--teal-mid);
    color: var(--teal-dark);
    border: none;
    padding: 0.65rem 1.2rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 0.6rem;
  }
  .intention-saved {
    margin-top: 0.85rem;
    padding: 0.85rem;
    background: rgba(93,202,165,0.12);
    border-radius: 8px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--teal-mid);
    font-size: 1rem;
    line-height: 1.55;
    position: relative;
    z-index: 1;
  }

  /* TRACKER */
  .tracker-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin: 1rem 0;
  }
  .tracker-day {
    aspect-ratio: 1;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--white);
  }
  .tracker-day:hover { border-color: var(--teal); color: var(--teal); }
  .tracker-day.done { background: var(--teal); border-color: var(--teal); color: white; }
  .tracker-message {
    background: var(--teal-light);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    font-size: 0.85rem;
    color: var(--teal-dark);
    line-height: 1.5;
  }
  .tracker-stat {
    display: flex;
    gap: 0.75rem;
    margin: 1rem 0;
  }
  .stat-card {
    flex: 1;
    background: var(--light);
    border-radius: 10px;
    padding: 0.85rem;
    text-align: center;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.7rem;
    color: var(--teal-dark);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--mid);
    margin-top: 0.3rem;
  }

  /* NUTRITION */
  .nutr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-top: 0.75rem;
  }
  @media (max-width: 480px) { .nutr-grid { grid-template-columns: 1fr; } }
  .nutr-card {
    background: var(--light);
    border-radius: 10px;
    padding: 0.8rem 0.95rem;
  }
  .nutr-name {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--teal-dark);
    margin-bottom: 0.3rem;
  }
  .nutr-foods { font-size: 0.78rem; color: var(--mid); line-height: 1.5; }

  /* RESET */
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--mid);
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    margin-top: 1rem;
  }

function renderWeek(c, weekNum) {

    3: 'Week 3 is about deepening, consolidating, and beginning to make this a way of life. The practices become more fluid. The vibrational work becomes more natural. You begin to know — not just believe — that your vision is changing.'
  };

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function toggleTimer() {
  if (timerState.running) {
    clearInterval(timerState.intervalId);
    timerState.running = false;
  } else {
    timerState.running = true;
    timerState.intervalId = setInterval(tickTimer, 1000);
  }
  if (currentTab === 'timer') renderTimer(document.getElementById('container'));
}

function resetTimer() {
  clearInterval(timerState.intervalId);
  timerState = { running: false, secondsLeft: 1200, intervalId: null, mode: 'work' };
  if (currentTab === 'timer') renderTimer(document.getElementById('container'));
}

function tickTimer() {
  timerState.secondsLeft--;
  if (currentTab === 'timer') {
    const d = document.getElementById('timer-display');
    if (d) d.textContent = formatTime(timerState.secondsLeft);
  }
  if (timerState.secondsLeft <= 0) {
    triggerAlert();
  }
}

function triggerAlert() {
  clearInterval(timerState.intervalId);
  timerState.running = false;
  // Audio beep
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 528; // healing frequency
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start();
    osc.stop(ctx.currentTime + 0.6);
    setTimeout(() => {
      const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.frequency.value = 528;
      g2.gain.setValueAtTime(0, ctx.currentTime);
      g2.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.05);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      o2.start(); o2.stop(ctx.currentTime + 0.6);
    }, 700);
  } catch(e) {}
  // Vibration
  if (navigator.vibrate) navigator.vibrate([300, 150, 300]);
  // Show modal
  document.getElementById('alert-overlay').classList.add('show');
  let count = 20;
  document.getElementById('alert-countdown').textContent = count;
  const cd = setInterval(() => {
    count--;
    document.getElementById('alert-countdown').textContent = count;
    if (count <= 0) {
      clearInterval(cd);
      dismissAlert();
    }
  }, 1000);
  document.getElementById('alert-dismiss').onclick = () => {
    clearInterval(cd);
    dismissAlert();
  };
}

function dismissAlert() {
  document.getElementById('alert-overlay').classList.remove('show');
  // Restart for next cycle
  timerState.secondsLeft = 1200;
  timerState.mode = 'work';
  timerState.running = true;
  timerState.intervalId = setInterval(tickTimer, 1000);
  if (currentTab === 'timer') renderTimer(document.getElementById('container'));
}

      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // New version is ready — show the banner
            document.getElementById('update-banner').classList.add('show');
          }
        });
      });

      // Handle the Update button
      document.getElementById('update-now').addEventListener('click', () => {
        if (reg.waiting) {
          reg.waiting.postMessage('skipWaiting');
        }
        document.getElementById('update-banner').classList.remove('show');
        window.location.reload();
      });

      // If SW controller changes (new SW took over), reload automatically
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });

    } catch(e) {
      // SW not supported or blocked — silent fail
    }
  });
}
</script>
</body>
</html>
